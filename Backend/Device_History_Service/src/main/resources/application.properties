spring.application.name=DEVICEHISTORY-SERVICE
spring.datasource.url=jdbc:mysql://localhost:3306/Device_History_db
spring.datasource.username=root
spring.datasource.password=Aman
server.port=8082

#for hibernate connection
spring.jpa.hibernate.ddl-auto=update

#for showing sql queries on console in well format
spring.jpa.show-sql=true
spring.jpa.properties.format-sql=true


