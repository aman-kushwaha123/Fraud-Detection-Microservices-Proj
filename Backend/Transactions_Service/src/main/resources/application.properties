spring.application.name=TRANSACTIONS-SERVICE
spring.datasource.url=jdbc:mysql://localhost:3306/transactionsdb
spring.datasource.username=root
spring.datasource.password=Aman
server.port=8086

#hibernate connections
spring.jpa.hibernate.ddl-auto=update

#shows sql queries on console
spring.jpa.show-sql=true
spring.jpa.properties.format-sql=true

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#Enable registration with Eureka
#eureka.client.register-with-eureka=true
#Enable fetching the registry (optional for discovery)
#eureka.client.fetch-registry=true

----------------------------------------#PRODUCER SETTING-----------------------------------------------------------------
spring.kafka.bootstrap.server=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

 #Producer retry

spring.kafka.producer.retries=10
spring.kafka.producer.retry.backoff.ms=500

# Consumer retry
spring.kafka.consumer.properties.retry.backoff.ms=500
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group.id=Transaction-consumer-group
#//spring.kafka.consumer.properties.spring.json.value.default.type=com.example.entities.AccountDetail
#spring.kafka.consumer.properties.spring.json.value.default.type=com.example.entities.Device_History
spring.kafka.consumer.max-poll-records=1

---------------------------------------------#CONSUMER SETTINGS----------------------------------------------------------
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
#Ignores __TypeId__ header if false
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
#For testing
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

#spring.kafka.consumer.max-poll-interval-ms: 300000       # 5 minutes
      
      
#spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.entities
# REQUIRED for JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
                     




