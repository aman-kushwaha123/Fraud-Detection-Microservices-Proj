spring.application.name=ACCOUNTDETAIL-SERVICE
spring.datasource.url=jdbc:mysql://localhost:3306/accountdetailsdb
spring.datasource.username=root
spring.datasource.password=Aman
server.port=8080

#provide hibernate connections
spring.jpa.hibernate.ddl-auto=update

#to show sql queries in console
spring.jpa.show-sql=true
#to show easy format of sql queries
spring.jpa.properties.hibernate.format-sql=true

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Enable registration with Eureka
#eureka.client.register-with-eureka=true
# Enable fetching the registry (optional for discovery)
#eureka.client.fetch-registry=true

----------------------------------------#PRODUCER SETTING-----------------------------------------------------------------
spring.kafka.bootstrap.server=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# Consumer group & offset
spring.kafka.consumer.group-id=AccountConsumer-Group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.max-poll-records=1
spring.kafka.consumer.properties.retry.backoff.ms=500

# Use ErrorHandlingDeserializer
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Delegate deserializers
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# JSON config
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=true




