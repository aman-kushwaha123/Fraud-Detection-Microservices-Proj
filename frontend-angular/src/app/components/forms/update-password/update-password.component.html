<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">

    <h1 class="text-2xl font-bold text-center mb-2">
      Update Your Password
    </h1>


    <form [formGroup]="updatePasswordForm" (ngSubmit)="submit()" class="space-y-4">
      <!-- Password -->
      <mat-form-field  class="w-full">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          maxlength="10"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword = !hidePassword"
        >
        </button>
        <mat-error *ngIf="updatePasswordForm.get('password')?.hasError('required')">
          Password is required
        </mat-error>
        <mat-error *ngIf="updatePasswordForm.get('password')?.hasError('minlength')">
          Minimum and Maximum 10 characters
        </mat-error>
      </mat-form-field>
         <!-- Submit -->
      <button mat-raised-button color="primary" class="w-full py-2 mt-4" [disabled]="updatePasswordForm.invalid">Update Password</button>
    </form>
    <button
        mat-raised-button
        color="primary"
        class="w-full py-2 mt-4"
        (click)="goback()"
      >
        Back
      </button>


  </div>
</div>
