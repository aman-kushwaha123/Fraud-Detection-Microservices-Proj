
<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <mat-card class="w-full max-w-sm p-6 space-y-4 shadow-xl rounded-lg bg-white">
    <h2 class="text-2xl font-bold text-center text-blue-600">Edit Profile</h2>

    <form (ngSubmit)="onSubmit()" class="space-y-4" [formGroup]="editProfileForm">
      <mat-form-field class="w-full">
        <mat-label>Username</mat-label>
        <input matInput placeholder="John Doe"  formControlName="username" maxlength="10" name="name" required>
        <mat-error *ngIf="editProfileForm.get('username')?.hasError('required')"> Username is required</mat-error>
        <mat-error *ngIf="editProfileForm.get('username')?.hasError('minlength')">Minlength should be 10</mat-error>
        <mat-error *ngIf="editProfileForm.get('username')?.hasError('pattern')">Enter only characters</mat-error>
      </mat-form-field>

      <mat-form-field class="w-full">
        <mat-label>Email</mat-label>
        <input matInput type="email" placeholder="you@example.com" formControlName="email" name="email" required>
        <mat-error *ngIf="editProfileForm.get('email')?.hasError('email')">Please enter valid email</mat-error>
        <mat-error *ngIf="editProfileForm.get('email')?.hasError('required')">Email is required</mat-error>
      </mat-form-field>

      <mat-form-field class="w-full">
        <mat-label>Mobile Number</mat-label>
        <input matInput type="text" placeholder="" formControlName="mobileNo" name="mobileNo" maxlength="10"
          required>
        <mat-error *ngIf="editProfileForm.get('mobileNo')?.hasError('required')">Mobile no is required</mat-error>
        <mat-error *ngIf="editProfileForm.get('mobileNo')?.hasError('minlength')">MinLength should be 10</mat-error>
        <mat-error *ngIf="editProfileForm.get('mobileNo')?.hasError('pattern')">Enter only Number</mat-error>
      </mat-form-field>

       <button mat-raised-button color="primary" class="w-full py-2 mt-4" [disabled]="editProfileForm.invalid">Update</button>
    </form>

    <button mat-raised-button color="primary" class="w-full py-2 mt-4" (click)="goback()">Back</button>

  </mat-card>
</div>
