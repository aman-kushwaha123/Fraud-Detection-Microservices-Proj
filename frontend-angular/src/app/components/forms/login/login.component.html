<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">

    <h1 class="text-2xl font-bold text-center mb-2">
      Welcome Back 👋
    </h1>
    <p class="text-gray-500 text-center mb-6">
      Please sign in to your account
    </p>

    <form [formGroup]="loginform" (ngSubmit)="submit()" class="space-y-4">

      <!-- Email -->
      <mat-form-field  class="w-full">
        <mat-label>Username</mat-label>
        <input matInput type="email" formControlName="username" maxlength="10" />
        <mat-error *ngIf="loginform.get('username')?.hasError('required')">
          username is required
        </mat-error>

      </mat-form-field>

      <!-- Password -->
      <mat-form-field  class="w-full">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          maxlength="10"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword = !hidePassword"
        >
        </button>
        <mat-error *ngIf="loginform.get('password')?.hasError('required')">
          Password is required
        </mat-error>
        <mat-error *ngIf="loginform.get('password')?.hasError('minlength')">
          Minimum and Maximum 10 characters
        </mat-error>
      </mat-form-field>

      <!-- Submit -->
      <button
        mat-raised-button
        color="primary"
        class="w-full h-12 text-base"
        [disabled]="loginform.invalid"
      >
        Login
      </button>
    </form>

    <!-- Footer -->
    <div class="text-center mt-6 text-sm text-gray-500">
      Don’t have an account?
      <a href="/register" class="text-black font-medium hover:underline">
        Sign up
      </a>
    </div>

  </div>
</div>
