<!-- src/app/app.component.html -->
<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <mat-card class="w-full max-w-sm p-6 space-y-4 shadow-xl rounded-lg bg-white">
    <h2 class="text-2xl font-bold text-center text-blue-600">Register</h2>

    <form (ngSubmit)="onSubmit()" class="space-y-4" [formGroup]="registerForm">
      <mat-form-field class="w-full">
        <mat-label>Username</mat-label>
        <input matInput placeholder="John Doe" formControlName="username" maxlength="10" name="name" required>
        <mat-error *ngIf="registerForm.get('username')?.hasError('required')"> Username is required</mat-error>
        <mat-error *ngIf="registerForm.get('username')?.hasError('minlength')">Minlength should be 10</mat-error>
        <mat-error *ngIf="registerForm.get('username')?.hasError('pattern')">Enter only characters</mat-error>
      </mat-form-field>

      <mat-form-field class="w-full">
        <mat-label>Email</mat-label>
        <input matInput type="email" placeholder="you@example.com" formControlName="email" name="email" required>
        <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Please enter valid email</mat-error>
        <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
      </mat-form-field>

      <mat-form-field class="w-full">
        <mat-label>Password</mat-label>
        <input matInput  [type]="hidePassword ? 'password' : 'text'"  placeholder="" formControlName="password" name="password" maxlength="10" required>
         <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword = !hidePassword"
        >
          <mat-icon>
            {{ hidePassword ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </button>
        <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Minimum length should be 10</mat-error>
        <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Email is required</mat-error>
      </mat-form-field>


      <mat-form-field class="w-full">
        <mat-label>Mobile Number</mat-label>
        <input matInput type="text" placeholder="" formControlName="mobileNo" name="mobileNo" maxlength="10"
          required>
        <mat-error *ngIf="registerForm.get('mobileNo')?.hasError('required')">Mobile no is required</mat-error>
        <mat-error *ngIf="registerForm.get('mobileNo')?.hasError('minlength')">MinLength should be 10</mat-error>
        <mat-error *ngIf="registerForm.get('mobileNo')?.hasError('pattern')">Enter only Number</mat-error>
      </mat-form-field>


       <button mat-raised-button color="primary" class="w-full py-2 mt-4"  [disabled]="registerForm.invalid">Register</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account? <a href="/login" class="text-blue-600">Login</a>
    </p>
  </mat-card>
</div>
