
<div class="max-w-4xl mx-auto p-6">

  <!-- Page Header -->
  <div class="flex flex-col md:flex-row justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-gray-800">My Profile</h1>
    <button mat-raised-button color="primary" routerLink="/profile/edit">
      Edit Profile
    </button>
  </div>

  <!-- Profile Card -->
  <mat-card class="shadow-lg rounded-lg border border-gray-200 p-6">
    <div class="flex flex-col md:flex-row items-center md:items-start gap-6">

      <!-- Round Placeholder -->
      <div class="flex-shrink-0">
        <div class="w-32 h-32 rounded-full bg-gray-600 flex items-center justify-center text-white text-3xl font-bold">
          {{ user?.username?.charAt(0) || 'U' }}
        </div>
      </div>

      <!-- Profile Details -->
      <div class="flex-1 space-y-4 text-gray-700">

        <div class="flex justify-between border-b pb-2">
          <span class="text-gray-500 ">Username</span>
          <span class="font-medium text-gray-800">{{ user?.username }}</span>
        </div>

        <div class="flex justify-between border-b pb-2">
          <span class="text-gray-500">Email</span>
          <span class="font-medium text-gray-800">{{ user?.email }}</span>
        </div>

        <div class="flex justify-between">
          <span class="text-gray-500">Mobile Number</span>
          <span class="font-medium text-gray-800">{{ user?.mobileNo }}</span>
        </div>

      </div>

    </div>
  </mat-card>

  <!-- Security Settings / Actions -->
  <mat-card class="shadow-lg rounded-lg border border-gray-200 p-6 mt-6">
    <h2 class="text-xl font-semibold text-gray-800 mb-4">Security & Settings</h2>
    <div class="flex flex-col md:flex-row gap-4">
      <button mat-stroked-button color="accent" routerLink="/changePassword">
        Change Password
      </button>
      <button mat-stroked-button color="warn" (click)="logout()">
        Logout
      </button>
    </div>
  </mat-card>

</div>
