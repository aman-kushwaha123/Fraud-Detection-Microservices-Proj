<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <mat-card class="w-full max-w-md p-8 shadow-lg rounded-lg text-center">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">Welcome to AKpay</h1>
    <p class="text-gray-600 mb-8">Please login or register to continue</p>

    <div class="flex flex-col gap-4">
      <button
        mat-raised-button
        color="primary"
        (click)="goToLogin()"
        class="py-3 font-semibold"
      >
        Login
      </button>
      <button
        mat-raised-button
        color="accent"
        (click)="goToRegister()"
        class="py-3 font-semibold"
      >
        Register
      </button>
    </div>
  </mat-card>
</div>
